<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070b16">
  <title>ActioMansot — портфель</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body data-page="portfolio">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand__icon">▲</span>
        <span>
          <strong>ActioMansot</strong>
          <small>Stock Simulator</small>
        </span>
      </a>

      <nav class="main-nav">
        <a class="main-nav__link" href="index.html">Рынок</a>
        <a class="main-nav__link active" href="portfolio.html">Портфель</a>
      </nav>

      <section class="account-panel">
        <div>
          <span class="muted">Игрок</span>
          <strong id="nickname">—</strong>
        </div>

        <div>
          <span class="muted">Баланс</span>
          <strong id="balance">$0.00</strong>
        </div>

        <button class="ghost-button" id="changeNicknameButton">Сменить ник</button>
      </section>
    </header>

    <main class="page-content">

      <section class="hero-card hero-card--portfolio">
        <div>
          <p class="eyebrow">Мой портфель</p>
          <h1>Контролируйте позиции и прибыль</h1>
        </div>

        <div class="hero-stats">
          <article>
            <span>Общий капитал</span>
            <strong id="netWorthHero">$0.00</strong>
          </article>

          <article>
            <span>Стоимость акций</span>
            <strong id="portfolioValueHero">$0.00</strong>
          </article>

          <article>
            <span>Прибыль</span>
            <strong id="profitHero">$0.00</strong>
          </article>

          <article>
            <span>Позиции</span>
            <strong id="positionsHero">0</strong>
          </article>
        </div>
      </section>

      <section class="portfolio-layout">

        <section class="summary-panel">
          <h2>Сводка</h2>

          <div class="summary-grid">
            <article>
              <span>Наличные</span>
              <strong id="cashSummary">$0.00</strong>
            </article>

            <article>
              <span>Портфель</span>
              <strong id="portfolioSummary">$0.00</strong>
            </article>

            <article>
              <span>Вложено</span>
              <strong id="investedSummary">$0.00</strong>
            </article>

            <article>
              <span>Доходность</span>
              <strong id="returnSummary">0%</strong>
            </article>
          </div>
        </section>

        <section class="holdings-panel">
          <div class="section-heading">
            <h2>Активы</h2>
            <a class="ghost-link" href="index.html">Купить</a>
          </div>

          <div id="portfolioList" class="portfolio-list"></div>
        </section>

      </section>

    </main>

    <div id="toast" class="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>

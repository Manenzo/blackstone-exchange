<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Stock Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📈 Биржа</h1>
  <div>
    💰 Баланс: <span id="balance">0</span>$
  </div>
</header>

<main>

  <div class="stock">
    <h3>AAPL</h3>
    <p>150$</p>
    <button onclick="buy('AAPL')">Купить</button>
    <button onclick="sell('AAPL')">Продать</button>
  </div>

  <div class="stock">
    <h3>TSLA</h3>
    <p>220$</p>
    <button onclick="buy('TSLA')">Купить</button>
    <button onclick="sell('TSLA')">Продать</button>
  </div>

  <div class="stock">
    <h3>GOOG</h3>
    <p>2800$</p>
    <button onclick="buy('GOOG')">Купить</button>
    <button onclick="sell('GOOG')">Продать</button>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
